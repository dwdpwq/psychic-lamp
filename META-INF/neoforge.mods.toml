description="Visual Crafting Table: manage KubeJS recipes without writing code. Place items in a 3x3 grid and output slot, then click Shaped or Shapeless to auto-generate recipes. Right-side panel displays all saved recipes with scroll and right-click removal. The Delete Recipe button bans any item's crafting recipe via event.remove — ideal for modpack balancing. All changes sync to kubejs/server_scripts instantly."

